# Docker Compose for RapidoDB
#
# Usage:
#   # Run RapidoDB server
#   docker-compose up rapidodb
#
#   # Run full benchmark comparison (RapidoDB vs BadgerDB vs LevelDB vs RocksDB)
#   docker-compose run benchmark
#
#   # Run with custom parameters
#   docker-compose run -e NUM_OPS=500000 -e VALUE_SIZE=1000 benchmark
#
#   # Run individual benchmarks
#   docker-compose run rapidodb-bench
#   docker-compose run badger-bench
#   docker-compose run leveldb-bench
#   docker-compose run rocksdb-bench

version: '3.8'

services:
  # RapidoDB Server
  rapidodb:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "11211:11211"
    volumes:
      - rapidodb-data:/data
    restart: unless-stopped

  # All-in-one benchmark comparison
  benchmark:
    build:
      context: .
      dockerfile: docker/Dockerfile.benchmark
    volumes:
      - ./benchmark-results:/benchmarks/results
    environment:
      - NUM_OPS=${NUM_OPS:-100000}
      - VALUE_SIZE=${VALUE_SIZE:-100}

  # Individual benchmarks (lighter builds)
  rapidodb-bench:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./benchmark-results:/results
    command: sh -c "rapidodb-bench --mode all --num ${NUM_OPS:-100000} --value-size ${VALUE_SIZE:-100} 2>&1 | tee /results/rapidodb.txt"

  # BadgerDB benchmark — uses the official `badger benchmark` CLI installed
  # in docker/Dockerfile.badger. RapidoDB module never imports BadgerDB.
  badger-bench:
    build:
      context: ./docker
      dockerfile: Dockerfile.badger
    volumes:
      - ./benchmark-results:/results
    command: >
      sh -c "mkdir -p /tmp/bdata &&
             echo '=== BadgerDB write benchmark ===' > /results/badger.txt &&
             badger benchmark write --dir=/tmp/bdata --key-count=${NUM_OPS:-100000} --value-size=${VALUE_SIZE:-100} 2>&1 | tee -a /results/badger.txt &&
             echo '' >> /results/badger.txt &&
             echo '=== BadgerDB read benchmark ===' >> /results/badger.txt &&
             badger benchmark read --dir=/tmp/bdata --key-count=${NUM_OPS:-100000} --duration=10s 2>&1 | tee -a /results/badger.txt"

  leveldb-bench:
    build:
      context: ./docker
      dockerfile: Dockerfile.leveldb
    volumes:
      - ./benchmark-results:/results
    command: sh -c "./db_bench --benchmarks=fillseq,fillrandom,readseq,readrandom --num=${NUM_OPS:-100000} --value_size=${VALUE_SIZE:-100} 2>&1 | tee /results/leveldb.txt"

  rocksdb-bench:
    build:
      context: ./docker
      dockerfile: Dockerfile.rocksdb
    volumes:
      - ./benchmark-results:/results
    command: sh -c "./db_bench --benchmarks=fillseq,fillrandom,readseq,readrandom --num=${NUM_OPS:-100000} --value_size=${VALUE_SIZE:-100} 2>&1 | tee /results/rocksdb.txt"

volumes:
  rapidodb-data:
