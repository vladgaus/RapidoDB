# Benchmark Workflow
# Compares RapidoDB vs BadgerDB vs LevelDB vs RocksDB
#
# Triggers:
#   - Manual: Actions tab -> "Run workflow"
#   - Weekly: Every Sunday at 00:00 UTC
#   - On release tags
#
# Results are uploaded as artifacts and posted to PR comments

name: Benchmark

on:
  # Manual trigger with customizable parameters
  workflow_dispatch:
    inputs:
      num_ops:
        description: 'Number of operations'
        required: false
        default: '100000'
      value_size:
        description: 'Value size in bytes'
        required: false
        default: '100'
      compare_dbs:
        description: 'Compare with other databases'
        required: false
        default: true
        type: boolean

  # Run weekly on Sunday
  schedule:
    - cron: '0 0 * * 0'

  # Run on release tags
  push:
    tags:
      - 'v*'

  # Optional: Run on PRs with [benchmark] in title
  pull_request:
    types: [opened, synchronize]

env:
  GO_VERSION: '1.22'
  NUM_OPS: ${{ github.event.inputs.num_ops || '100000' }}
  VALUE_SIZE: ${{ github.event.inputs.value_size || '100' }}

# Required for PR comments
permissions:
  contents: read
  pull-requests: write

jobs:
  # ============================================================================
  # RapidoDB Benchmark
  # ============================================================================
  rapidodb:
    name: RapidoDB Benchmark
    runs-on: ubuntu-latest
    outputs:
      fillseq: ${{ steps.parse.outputs.fillseq }}
      fillrandom: ${{ steps.parse.outputs.fillrandom }}
      readseq: ${{ steps.parse.outputs.readseq }}
      readrandom: ${{ steps.parse.outputs.readrandom }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build RapidoDB
        run: |
          go build -o rapidodb-bench ./cmd/bench
          
      - name: Run Benchmark
        run: |
          ./rapidodb-bench --mode all --num ${{ env.NUM_OPS }} --value-size ${{ env.VALUE_SIZE }} 2>&1 | tee rapidodb-results.txt

      - name: Parse Results
        id: parse
        run: |
          # Extract ops/sec for each workload from the comparison table
          FILLSEQ=$(grep "fillseq" rapidodb-results.txt | grep -oP '\d+(?=\s+\d+\.\d+\s+\d+\.\d+\s+\d+\.\d+ ║)' | head -1 || echo "N/A")
          FILLRANDOM=$(grep "fillrandom" rapidodb-results.txt | grep -oP '\d+(?=\s+\d+\.\d+\s+\d+\.\d+\s+\d+\.\d+ ║)' | head -1 || echo "N/A")
          READSEQ=$(grep "readseq" rapidodb-results.txt | grep -oP '\d+(?=\s+\d+\.\d+\s+\d+\.\d+\s+\d+\.\d+ ║)' | head -1 || echo "N/A")
          READRANDOM=$(grep "readrandom" rapidodb-results.txt | grep -oP '\d+(?=\s+\d+\.\d+\s+\d+\.\d+\s+\d+\.\d+ ║)' | head -1 || echo "N/A")
          
          echo "fillseq=$FILLSEQ" >> $GITHUB_OUTPUT
          echo "fillrandom=$FILLRANDOM" >> $GITHUB_OUTPUT
          echo "readseq=$READSEQ" >> $GITHUB_OUTPUT
          echo "readrandom=$READRANDOM" >> $GITHUB_OUTPUT
          
          echo "### RapidoDB Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat rapidodb-results.txt >> $GITHUB_STEP_SUMMARY

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: rapidodb-results
          path: rapidodb-results.txt

  # ============================================================================
  # BadgerDB Benchmark (pure Go competitor)
  # ============================================================================
  badger:
    name: BadgerDB Benchmark
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event.inputs.compare_dbs != 'false'
    outputs:
      fillseq: ${{ steps.parse.outputs.fillseq }}
      fillrandom: ${{ steps.parse.outputs.fillrandom }}
      readseq: ${{ steps.parse.outputs.readseq }}
      readrandom: ${{ steps.parse.outputs.readrandom }}
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install BadgerDB CLI
        run: |
          # BadgerDB ships an official `badger benchmark` CLI.
          # Installed via `go install` so it stays fully outside
          # the RapidoDB module. The main repo has zero contact with BadgerDB.
          go install github.com/dgraph-io/badger/v4/badger@v4.2.0
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Run Benchmark
        run: |
          # `badger benchmark write` does sequential writes (= fillseq).
          # `badger benchmark read`  does random reads     (= readrandom).
          # BadgerDB CLI does not distinguish fillrandom/readseq, so we report
          # the same number for write→fillseq/fillrandom and read→readseq/readrandom.

          mkdir -p /tmp/badger-data
          rm -rf /tmp/badger-data/*

          echo "=== BadgerDB write benchmark ===" | tee badger-results.txt
          badger benchmark write \
            --dir=/tmp/badger-data \
            --key-count=${{ env.NUM_OPS }} \
            --value-size=${{ env.VALUE_SIZE }} \
            2>&1 | tee -a badger-results.txt

          echo "" >> badger-results.txt
          echo "=== BadgerDB read benchmark ===" >> badger-results.txt
          badger benchmark read \
            --dir=/tmp/badger-data \
            --key-count=${{ env.NUM_OPS }} \
            --duration=10s \
            2>&1 | tee -a badger-results.txt

          rm -rf /tmp/badger-data

      - name: Parse Results
        id: parse
        run: |
          # BadgerDB output looks like:
          #   [WRITE] Time elapsed: 5s, ... entries written: 100000, speed: 20000/sec
          #   [READ]  Time elapsed: 10s, ... entries read: 5000000, speed: 500000/sec
          # We extract the number before "/sec".

          echo "=== BadgerDB Raw Output ==="
          cat badger-results.txt
          echo "==========================="

          WRITE_OPS=$(grep -oP 'entries written:[^,]*, speed: \K[0-9]+(?=/sec)' badger-results.txt | tail -1 || echo "")
          READ_OPS=$(grep -oP 'entries read:[^,]*, speed: \K[0-9]+(?=/sec)' badger-results.txt | tail -1 || echo "")

          [ -z "$WRITE_OPS" ] && WRITE_OPS="N/A"
          [ -z "$READ_OPS" ] && READ_OPS="N/A"

          # BadgerDB CLI doesn't distinguish seq/random — report same number for both.
          FILLSEQ=$WRITE_OPS
          FILLRANDOM=$WRITE_OPS
          READSEQ=$READ_OPS
          READRANDOM=$READ_OPS

          echo "DEBUG: WRITE=$WRITE_OPS READ=$READ_OPS"

          echo "fillseq=$FILLSEQ" >> $GITHUB_OUTPUT
          echo "fillrandom=$FILLRANDOM" >> $GITHUB_OUTPUT
          echo "readseq=$READSEQ" >> $GITHUB_OUTPUT
          echo "readrandom=$READRANDOM" >> $GITHUB_OUTPUT

          echo "### BadgerDB Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Operation | ops/s |" >> $GITHUB_STEP_SUMMARY
          echo "|:----------|------:|" >> $GITHUB_STEP_SUMMARY
          echo "| write | $WRITE_OPS |" >> $GITHUB_STEP_SUMMARY
          echo "| read | $READ_OPS |" >> $GITHUB_STEP_SUMMARY

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: badger-results
          path: badger-results.txt

  # ============================================================================
  # LevelDB Benchmark (optional)
  # ============================================================================
  leveldb:
    name: LevelDB Benchmark
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event.inputs.compare_dbs != 'false'
    outputs:
      fillseq: ${{ steps.parse.outputs.fillseq }}
      fillrandom: ${{ steps.parse.outputs.fillrandom }}
      readseq: ${{ steps.parse.outputs.readseq }}
      readrandom: ${{ steps.parse.outputs.readrandom }}
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake bc

      - name: Cache LevelDB
        id: cache-leveldb
        uses: actions/cache@v4
        with:
          path: leveldb
          key: leveldb-build-v1.23-full-${{ runner.os }}

      - name: Build LevelDB
        if: steps.cache-leveldb.outputs.cache-hit != 'true'
        run: |
          # Clone WITHOUT --depth 1 to properly fetch submodules
          git clone --branch 1.23 https://github.com/google/leveldb.git
          cd leveldb
          git submodule update --init --recursive
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CXX_STANDARD=17 \
                -DLEVELDB_BUILD_TESTS=ON \
                -DLEVELDB_BUILD_BENCHMARKS=ON ..
          make db_bench -j$(nproc)

      - name: Run Benchmark
        run: |
          cd leveldb/build
          # Run fill first, then reads on same DB
          ./db_bench --benchmarks=fillseq,readrandom,readseq \
                     --num=${{ env.NUM_OPS }} \
                     --value_size=${{ env.VALUE_SIZE }} 2>&1 | tee ../../leveldb-results.txt
          # Run fillrandom separately
          ./db_bench --benchmarks=fillrandom \
                     --num=${{ env.NUM_OPS }} \
                     --value_size=${{ env.VALUE_SIZE }} 2>&1 | tee -a ../../leveldb-results.txt

      - name: Parse Results
        id: parse
        run: |
          # LevelDB outputs "micros/op" not "ops/s", so we need to convert
          # Format varies:
          #   fillseq      :       2.495 micros/op;   44.3 MB/s
          #   readrandom   :       1.308 micros/op; (100000 of 100000 found)
          
          echo "=== LevelDB Raw Output ===" 
          cat leveldb-results.txt
          echo "=========================="
          
          extract_ops() {
            local bench=$1
            # Find line containing benchmark name, extract number before "micros/op"
            local micros=$(grep "$bench" leveldb-results.txt | grep "micros/op" | awk -F':' '{print $2}' | awk '{print $1}' | head -1)
            echo "DEBUG $bench: micros='$micros'" >&2
            
            if [ -n "$micros" ] && [ "$micros" != "0" ]; then
              # Convert micros/op to ops/s: 1,000,000 / micros
              local ops=$(echo "scale=0; 1000000 / $micros" | bc 2>/dev/null)
              if [ -n "$ops" ]; then
                echo "$ops"
              else
                echo "N/A"
              fi
            else
              echo "N/A"
            fi
          }
          
          FILLSEQ=$(extract_ops "fillseq")
          FILLRANDOM=$(extract_ops "fillrandom")
          READSEQ=$(extract_ops "readseq")
          READRANDOM=$(extract_ops "readrandom")
          
          echo "DEBUG: FILLSEQ=$FILLSEQ FILLRANDOM=$FILLRANDOM READSEQ=$READSEQ READRANDOM=$READRANDOM" >&2
          
          echo "fillseq=$FILLSEQ" >> $GITHUB_OUTPUT
          echo "fillrandom=$FILLRANDOM" >> $GITHUB_OUTPUT
          echo "readseq=$READSEQ" >> $GITHUB_OUTPUT
          echo "readrandom=$READRANDOM" >> $GITHUB_OUTPUT
          
          echo "### LevelDB Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Benchmark | ops/s |" >> $GITHUB_STEP_SUMMARY
          echo "|:----------|------:|" >> $GITHUB_STEP_SUMMARY
          echo "| fillseq | $FILLSEQ |" >> $GITHUB_STEP_SUMMARY
          echo "| fillrandom | $FILLRANDOM |" >> $GITHUB_STEP_SUMMARY
          echo "| readseq | $READSEQ |" >> $GITHUB_STEP_SUMMARY
          echo "| readrandom | $READRANDOM |" >> $GITHUB_STEP_SUMMARY

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: leveldb-results
          path: leveldb-results.txt

  # ============================================================================
  # RocksDB Benchmark (optional) - with improved caching
  # ============================================================================
  rocksdb:
    name: RocksDB Benchmark
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event.inputs.compare_dbs != 'false'
    outputs:
      fillseq: ${{ steps.parse.outputs.fillseq }}
      fillrandom: ${{ steps.parse.outputs.fillrandom }}
      readseq: ${{ steps.parse.outputs.readseq }}
      readrandom: ${{ steps.parse.outputs.readrandom }}
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgflags-dev libsnappy-dev \
               zlib1g-dev libbz2-dev liblz4-dev libzstd-dev

      - name: Cache RocksDB Build
        id: cache-rocksdb
        uses: actions/cache@v4
        with:
          path: rocksdb
          key: rocksdb-v8.10.0-release-${{ runner.os }}-v2

      - name: Build RocksDB
        if: steps.cache-rocksdb.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v8.10.0 https://github.com/facebook/rocksdb.git
          cd rocksdb
          # Build in RELEASE mode (DEBUG_LEVEL=0) for faster build and accurate benchmarks
          DEBUG_LEVEL=0 PORTABLE=1 make db_bench -j$(nproc)

      - name: Run Benchmark
        run: |
          cd rocksdb
          ./db_bench --benchmarks=fillseq,fillrandom,readseq,readrandom \
                     --num=${{ env.NUM_OPS }} \
                     --value_size=${{ env.VALUE_SIZE }} 2>&1 | tee ../rocksdb-results.txt

      - name: Parse Results
        id: parse
        run: |
          FILLSEQ=$(grep "^fillseq" rocksdb-results.txt | awk '{print $5}' || echo "N/A")
          FILLRANDOM=$(grep "^fillrandom" rocksdb-results.txt | awk '{print $5}' || echo "N/A")
          READSEQ=$(grep "^readseq" rocksdb-results.txt | awk '{print $5}' || echo "N/A")
          READRANDOM=$(grep "^readrandom" rocksdb-results.txt | awk '{print $5}' || echo "N/A")
          
          echo "fillseq=$FILLSEQ" >> $GITHUB_OUTPUT
          echo "fillrandom=$FILLRANDOM" >> $GITHUB_OUTPUT
          echo "readseq=$READSEQ" >> $GITHUB_OUTPUT
          echo "readrandom=$READRANDOM" >> $GITHUB_OUTPUT
          
          echo "### RocksDB Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Benchmark | ops/s |" >> $GITHUB_STEP_SUMMARY
          echo "|:----------|------:|" >> $GITHUB_STEP_SUMMARY
          echo "| fillseq | $FILLSEQ |" >> $GITHUB_STEP_SUMMARY
          echo "| fillrandom | $FILLRANDOM |" >> $GITHUB_STEP_SUMMARY
          echo "| readseq | $READSEQ |" >> $GITHUB_STEP_SUMMARY
          echo "| readrandom | $READRANDOM |" >> $GITHUB_STEP_SUMMARY

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: rocksdb-results
          path: rocksdb-results.txt

  # ============================================================================
  # Summary Report
  # ============================================================================
  summary:
    name: Generate Summary
    runs-on: ubuntu-latest
    needs: [rapidodb, badger, leveldb, rocksdb]
    if: always() && needs.rapidodb.result == 'success'
    steps:
      - name: Download All Results
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Generate Comparison Report
        run: |
          echo "# 📊 Benchmark Comparison Report" > report.md
          echo "" >> report.md
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> report.md
          echo "**Operations:** ${{ env.NUM_OPS }}" >> report.md
          echo "**Value Size:** ${{ env.VALUE_SIZE }} bytes" >> report.md
          echo "**Runner:** GitHub Actions (ubuntu-latest)" >> report.md
          echo "" >> report.md

          echo "## Results Summary" >> report.md
          echo "" >> report.md
          echo "| Workload | RapidoDB | BadgerDB | LevelDB | RocksDB |" >> report.md
          echo "|:---------|:---------|:---------|:--------|:--------|" >> report.md
          echo "| fillseq | ${{ needs.rapidodb.outputs.fillseq }} | ${{ needs.badger.outputs.fillseq }} | ${{ needs.leveldb.outputs.fillseq }} | ${{ needs.rocksdb.outputs.fillseq }} |" >> report.md
          echo "| fillrandom | ${{ needs.rapidodb.outputs.fillrandom }} | ${{ needs.badger.outputs.fillrandom }} | ${{ needs.leveldb.outputs.fillrandom }} | ${{ needs.rocksdb.outputs.fillrandom }} |" >> report.md
          echo "| readseq | ${{ needs.rapidodb.outputs.readseq }} | ${{ needs.badger.outputs.readseq }} | ${{ needs.leveldb.outputs.readseq }} | ${{ needs.rocksdb.outputs.readseq }} |" >> report.md
          echo "| readrandom | ${{ needs.rapidodb.outputs.readrandom }} | ${{ needs.badger.outputs.readrandom }} | ${{ needs.leveldb.outputs.readrandom }} | ${{ needs.rocksdb.outputs.readrandom }} |" >> report.md
          echo "" >> report.md

          echo "## Database Comparison" >> report.md
          echo "" >> report.md
          echo "| Feature | RapidoDB | BadgerDB | LevelDB | RocksDB |" >> report.md
          echo "|:--------|:--------:|:--------:|:-------:|:-------:|" >> report.md
          echo "| Storage | Disk (LSM) | Disk (LSM/WiscKey) | Disk (LSM) | Disk (LSM) |" >> report.md
          echo "| Language | Go | Go | C++ | C++ |" >> report.md
          echo "| Dependencies | **0** | ~10 | 2 | 20+ |" >> report.md
          echo "| CGO Required | **No** | No | Yes | Yes |" >> report.md
          echo "| Server Mode | **Yes (built-in)** | No | No | No |" >> report.md
          echo "| Memcached Protocol | **Yes** | No | No | No |" >> report.md
          echo "" >> report.md

          echo "## Notes" >> report.md
          echo "" >> report.md
          echo "- **RapidoDB**: Zero dependencies, 4MB binary, 5-second build, pure Go, built-in TCP server" >> report.md
          echo "- **BadgerDB**: Pure Go, embedded library only, WiscKey architecture (SSD-optimized)" >> report.md
          echo "- **LevelDB**: Original LSM implementation by Google, requires C++ toolchain" >> report.md
          echo "- **RocksDB**: Highly optimized, 20+ dependencies, long build time" >> report.md
          echo "- Results may vary based on GitHub Actions runner availability" >> report.md
          echo "" >> report.md

          echo "## Full Results" >> report.md
          echo "" >> report.md

          for db in rapidodb badger leveldb rocksdb; do
            if [ -f "results/${db}-results/${db}-results.txt" ]; then
              echo "<details>" >> report.md
              echo "<summary>${db^} Full Output</summary>" >> report.md
              echo "" >> report.md
              echo '```' >> report.md
              cat "results/${db}-results/${db}-results.txt" >> report.md
              echo '```' >> report.md
              echo "</details>" >> report.md
              echo "" >> report.md
            fi
          done

          cat report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: report.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf8');
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Benchmark Comparison Report')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: report
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
            }

  # ============================================================================
  # Quick Benchmark (RapidoDB only, for PRs)
  # ============================================================================
  quick-bench:
    name: Quick Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.title, '[full-benchmark]')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build and Run Quick Benchmark
        run: |
          go build -o rapidodb-bench ./cmd/bench
          echo "### Quick Benchmark (10K ops)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ./rapidodb-bench --mode all --num 10000 2>&1 | tee -a $GITHUB_STEP_SUMMARY
